# ─── Nginx config for Addis Bright Academy ────────────────────────
# Place this file at: /etc/nginx/sites-available/addisbright
# Then: ln -s /etc/nginx/sites-available/addisbright /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

# Rate limiting zones
limit_req_zone  $binary_remote_addr  zone=api:10m     rate=20r/s;
limit_req_zone  $binary_remote_addr  zone=auth:10m    rate=5r/m;
limit_conn_zone $binary_remote_addr  zone=perip:10m;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/xml+rss application/atom+xml image/svg+xml;

upstream addisbright_backend {
    # PM2 runs all workers on port 5000; Nginx load-balances across them
    server 127.0.0.1:5000;
    keepalive 64;   # keep connections warm — avoids TCP handshake per request
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name addisbright.edu.et www.addisbright.edu.et;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name addisbright.edu.et www.addisbright.edu.et;

    # SSL — managed by Certbot (run: certbot --nginx -d addisbright.edu.et)
    ssl_certificate     /etc/letsencrypt/live/addisbright.edu.et/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/addisbright.edu.et/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Limits
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   30s;
    keepalive_timeout       75s;
    limit_conn perip        100;   # max 100 concurrent connections per IP

    # ── Static files (Vite build output) ─────────────────────────
    root /var/www/addisbright/public;

    location / {
        try_files $uri $uri/ @node;
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── API proxy → Node ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://addisbright_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # Stricter limit on auth endpoints
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://addisbright_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Socket.io) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://addisbright_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # keep WS alive up to 24h
        proxy_send_timeout 86400s;
    }

    # SPA fallback — all non-file paths serve index.html
    location @node {
        proxy_pass         http://addisbright_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
